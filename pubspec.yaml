name: perpus_app
description: Professional Library Management System Application built with Flutter.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^6.0.0
  provider: ^6.1.0
  sqflite: ^2.3.0
  path: ^1.8.3
  intl: ^0.19.0
  fl_chart: ^0.65.0
  flutter_animate: ^4.2.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  animations: ^2.0.11
  get_it: ^7.6.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500